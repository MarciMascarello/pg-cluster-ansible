---
# =============================================================================
# change_wal_level.yml — Altera wal_level no cluster Patroni em execução
#
# Aplica a mudança via patronictl edit-config (DCS) e executa rolling restart.
# Réplicas são reiniciadas primeiro; o primário por último.
#
# Requer: cluster saudável (1 leader + réplicas em estado running/streaming)
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini change_wal_level.yml
#   ansible-playbook -i inventory/hosts.ini change_wal_level.yml \
#     -e pg_wal_level=replica   # para reverter
# =============================================================================

# =============================================================================
# FASE 1 — Verificação de saúde do cluster
# =============================================================================
- name: "WAL LEVEL [1/3] — Preflight: verificar saúde do cluster"
  hosts: pg_cluster
  become: true
  gather_facts: false
  run_once: true
  tasks:

    - name: "[PREFLIGHT] Aguardar Patroni API responder"
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: "{{ patroni_port }}"
        timeout: 30

    - name: "[PREFLIGHT] Verificar cluster: 1 leader + réplicas running"
      ansible.builtin.shell: |
        patronictl -c /etc/patroni/patroni.yml list --format json | python3 -c "
        import json, sys
        nodes = json.load(sys.stdin)
        leaders  = [n for n in nodes if n.get('Role') == 'Leader'  and n.get('State') == 'running']
        replicas = [n for n in nodes if n.get('Role') == 'Replica' and n.get('State') in ('running', 'streaming')]
        total = len(nodes)
        print(f'Leader: {len(leaders)}  Replicas: {len(replicas)}  Total: {total}')
        if len(leaders) != 1:
            print('ERRO: nenhum ou mais de um leader', file=sys.stderr)
            sys.exit(1)
        if len(replicas) < total - 1:
            print('ERRO: replica(s) nao saudaveis', file=sys.stderr)
            sys.exit(1)
        "
      become_user: postgres
      register: preflight
      changed_when: false

    - name: "[PREFLIGHT] Topologia atual"
      ansible.builtin.debug:
        msg: "{{ preflight.stdout }}"

    - name: "[PREFLIGHT] Verificar wal_level atual"
      ansible.builtin.shell: |
        psql -U postgres -tAc "SHOW wal_level;"
      become_user: postgres
      register: current_wal_level
      changed_when: false

    - name: "[PREFLIGHT] wal_level atual: {{ current_wal_level.stdout }}"
      ansible.builtin.debug:
        msg: "wal_level atual: {{ current_wal_level.stdout }} → alvo: {{ pg_wal_level }}"

    - name: "[PREFLIGHT] Nada a fazer — wal_level já é {{ pg_wal_level }}"
      ansible.builtin.meta: end_play
      when: current_wal_level.stdout == pg_wal_level

# =============================================================================
# FASE 2 — Aplicar wal_level no DCS via patronictl edit-config
# =============================================================================
- name: "WAL LEVEL [2/3] — Aplicar {{ pg_wal_level }} no DCS"
  hosts: pg_cluster
  become: true
  gather_facts: false
  run_once: true
  tasks:

    - name: "[CONFIG] Patch wal_level={{ pg_wal_level }} no DCS"
      ansible.builtin.shell: |
        patronictl -c /etc/patroni/patroni.yml edit-config \
          --patch '{"postgresql": {"parameters": {"wal_level": "{{ pg_wal_level }}"}}}' \
          --force
      become_user: postgres
      register: edit_result
      changed_when: "'No changes to apply' not in edit_result.stdout"

    - name: "[CONFIG] Resultado do edit-config"
      ansible.builtin.debug:
        msg: "{{ edit_result.stdout_lines }}"

    - name: "[CONFIG] Aguardar Patroni sinalizar pending_restart em todos os nós"
      ansible.builtin.shell: |
        patronictl -c /etc/patroni/patroni.yml list --format json | python3 -c "
        import json, sys
        nodes = json.load(sys.stdin)
        pending = [n['Member'] for n in nodes if n.get('Pending restart', False) or n.get('Pending Restart', False)]
        total   = len(nodes)
        print(f'Pending restart: {pending} ({len(pending)}/{total})')
        sys.exit(0 if len(pending) == total else 1)
        "
      become_user: postgres
      register: pending_check
      retries: 12
      delay: 5
      until: pending_check.rc == 0
      changed_when: false
      failed_when: false

    - name: "[CONFIG] Status pending restart"
      ansible.builtin.debug:
        msg: "{{ pending_check.stdout }}"

# =============================================================================
# FASE 3 — Rolling restart (réplicas primeiro, primário por último)
# =============================================================================
- name: "WAL LEVEL [3/3] — Rolling restart do cluster"
  hosts: pg_cluster
  become: true
  gather_facts: false
  run_once: true
  tasks:

    - name: "[RESTART] Iniciar rolling restart via patronictl"
      ansible.builtin.shell: |
        patronictl -c /etc/patroni/patroni.yml restart {{ cluster_scope }} --force
      become_user: postgres
      register: restart_result
      timeout: 300

    - name: "[RESTART] Output do restart"
      ansible.builtin.debug:
        msg: "{{ restart_result.stdout_lines }}"

    - name: "[RESTART] Aguardar cluster voltar ao estado saudável"
      ansible.builtin.shell: |
        patronictl -c /etc/patroni/patroni.yml list --format json | python3 -c "
        import json, sys
        nodes = json.load(sys.stdin)
        leaders  = [n for n in nodes if n.get('Role') == 'Leader'  and n.get('State') == 'running']
        replicas = [n for n in nodes if n.get('Role') == 'Replica' and n.get('State') in ('running', 'streaming')]
        total = len(nodes)
        print(f'Leader: {len(leaders)}  Replicas: {len(replicas)}  Total: {total}')
        sys.exit(0 if len(leaders) == 1 and (len(leaders) + len(replicas)) == total else 1)
        "
      become_user: postgres
      register: post_check
      retries: 24
      delay: 5
      until: post_check.rc == 0
      changed_when: false

    - name: "[RESTART] Topologia pós-restart"
      ansible.builtin.debug:
        msg: "{{ post_check.stdout }}"

    - name: "[VERIFY] Confirmar wal_level em todos os nós"
      ansible.builtin.shell: |
        psql -U postgres -tAc "SHOW wal_level;"
      become_user: postgres
      register: final_wal_level
      changed_when: false
      delegate_to: "{{ item }}"
      loop: "{{ groups['pg_cluster'] }}"

    - name: "[VERIFY] wal_level por nó"
      ansible.builtin.debug:
        msg: "{{ item.item }}: wal_level = {{ item.stdout }}"
      loop: "{{ final_wal_level.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "[VERIFY] Falha: wal_level incorreto em {{ item.item }}"
      ansible.builtin.fail:
        msg: "Esperado '{{ pg_wal_level }}', encontrado '{{ item.stdout }}' em {{ item.item }}"
      when: item.stdout != pg_wal_level
      loop: "{{ final_wal_level.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "[VERIFY] Topologia final"
      ansible.builtin.shell: |
        patronictl -c /etc/patroni/patroni.yml list
      become_user: postgres
      register: final_topo
      changed_when: false

    - name: "[VERIFY] Cluster OK — wal_level={{ pg_wal_level }}"
      ansible.builtin.debug:
        msg: "{{ final_topo.stdout_lines }}"
