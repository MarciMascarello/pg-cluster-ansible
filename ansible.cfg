[defaults]
# Inventory file used when -i is not specified
inventory = inventory/hosts.ini

# Disable host key checking — host keys are pre-registered by setup.sh via ssh-keyscan
host_key_checking = False

# Increase SSH timeout for slow or remote nodes
timeout = 30

# Suppress deprecation warnings in output
deprecation_warnings = False

# Display task results in a more readable YAML format (ansible-core 2.13+)
stdout_callback = ansible.builtin.default
result_format = yaml

[ssh_connection]
# Reuse SSH connections for faster playbook execution
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = True
